<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="gsx-title">
  <title id="gsx-title">.gsx file format icon</title>
  <!-- .gsx file icon — document shape with Monokai dark cells for "gsx" -->

  <!-- Document body -->
  <path d="M12,4 L42,4 L52,14 L52,60 L12,60 Z" fill="#272822"/>
  <path d="M12,4 L42,4 L52,14 L52,60 L12,60 Z" fill="none" stroke="#49483e" stroke-width="1.5"/>

  <!-- Dog-ear fold -->
  <path d="M42,4 L42,14 L52,14" fill="#3e3d32"/>
  <path d="M42,4 L42,14 L52,14" fill="none" stroke="#49483e" stroke-width="1.5"/>

  <!-- Content lines (faint, above the cells) -->
  <rect x="18" y="20" width="20" height="2" rx="1" fill="#66d9ef" opacity="0.2"/>
  <rect x="18" y="25" width="14" height="2" rx="1" fill="#f92672" opacity="0.15"/>
  <rect x="18" y="30" width="24" height="2" rx="1" fill="#a6e22e" opacity="0.15"/>

  <!-- "gsx" label in Monokai dark cells at bottom -->
  <!-- g cell -->
  <rect x="14" y="40" width="12" height="14" rx="2" fill="#272822"/>
  <rect x="14" y="40" width="12" height="14" rx="2" fill="none" stroke="#49483e" stroke-width="1"/>
  <text x="20" y="51" font-family="'Fira Code','SF Mono','Consolas',monospace" font-size="10" font-weight="700" fill="#f92672" text-anchor="middle">g</text>

  <!-- s cell -->
  <rect x="27" y="40" width="12" height="14" rx="2" fill="#272822"/>
  <rect x="27" y="40" width="12" height="14" rx="2" fill="none" stroke="#49483e" stroke-width="1"/>
  <text x="33" y="51" font-family="'Fira Code','SF Mono','Consolas',monospace" font-size="10" font-weight="700" fill="#a6e22e" text-anchor="middle">s</text>

  <!-- x cell -->
  <rect x="40" y="40" width="12" height="14" rx="2" fill="#272822"/>
  <rect x="40" y="40" width="12" height="14" rx="2" fill="none" stroke="#49483e" stroke-width="1"/>
  <text x="46" y="51" font-family="'Fira Code','SF Mono','Consolas',monospace" font-size="10" font-weight="700" fill="#66d9ef" text-anchor="middle">x</text>
</svg>