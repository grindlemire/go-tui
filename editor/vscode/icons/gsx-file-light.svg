<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="gsxl-title">
  <title id="gsxl-title">.gsx file format icon on light background</title>
  <!-- Same dark cells work on light — they carry their own background -->

  <!-- Document body -->
  <path d="M12,4 L42,4 L52,14 L52,60 L12,60 Z" fill="#f0f0ec"/>
  <path d="M12,4 L42,4 L52,14 L52,60 L12,60 Z" fill="none" stroke="#d8d8d0" stroke-width="1.5"/>

  <!-- Dog-ear fold -->
  <path d="M42,4 L42,14 L52,14" fill="#e8e8e3"/>
  <path d="M42,4 L42,14 L52,14" fill="none" stroke="#d8d8d0" stroke-width="1.5"/>

  <!-- Content lines -->
  <rect x="18" y="20" width="20" height="2" rx="1" fill="#2f9eb8" opacity="0.15"/>
  <rect x="18" y="25" width="14" height="2" rx="1" fill="#d42568" opacity="0.12"/>
  <rect x="18" y="30" width="24" height="2" rx="1" fill="#638b0c" opacity="0.12"/>

  <!-- "gsx" label in Monokai dark cells -->
  <rect x="14" y="40" width="12" height="14" rx="2" fill="#272822"/>
  <rect x="14" y="40" width="12" height="14" rx="2" fill="none" stroke="#3e3d32" stroke-width="1"/>
  <text x="20" y="51" font-family="'Fira Code','SF Mono','Consolas',monospace" font-size="10" font-weight="700" fill="#f92672" text-anchor="middle">g</text>

  <rect x="27" y="40" width="12" height="14" rx="2" fill="#272822"/>
  <rect x="27" y="40" width="12" height="14" rx="2" fill="none" stroke="#3e3d32" stroke-width="1"/>
  <text x="33" y="51" font-family="'Fira Code','SF Mono','Consolas',monospace" font-size="10" font-weight="700" fill="#a6e22e" text-anchor="middle">s</text>

  <rect x="40" y="40" width="12" height="14" rx="2" fill="#272822"/>
  <rect x="40" y="40" width="12" height="14" rx="2" fill="none" stroke="#3e3d32" stroke-width="1"/>
  <text x="46" y="51" font-family="'Fira Code','SF Mono','Consolas',monospace" font-size="10" font-weight="700" fill="#66d9ef" text-anchor="middle">x</text>
</svg>